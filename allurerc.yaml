name: Dashboard tests for Tests-Function-Api-Calling-OpenAi
output: ./allure-report

# historyPath: ./history.jsonl
appendHistory: false
qualityGate:
  rules:
    - maxFailures: 5
      fastFail: true
plugins:
  awesome:
    options:
      groupBy: ["epic", "feature", "story"]
      reportName: Test Module Validate
      singleFile: true 
      reportLanguage: ru
      open: true
      publish: true
  log:
    options:
      groupBy: none
variables:
  App Version: 0.4.0 