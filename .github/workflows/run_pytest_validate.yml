name: Test module 1 -> Validate json-schema and python function

on:
  push:
    branches: [ dev ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Allure 3
        run: npm install

      - name: Run Pytest
        run: uv run pytest

      - name: Generate Allure Report
        run: npx allure generate allure-results --config allurerc.yaml
      
      - name: Build Awesome Allure Report
        run: npx allure awesome allure-result/ --config allurerc.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-result/ 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
