name: 'AI Function & Schema Validator'
description: 'Валидация функций и генерация отчета'

inputs:
  func_path:
    description: 'Путь к .py файлу функции'
    required: true
  schema_path:
    description: 'Путь к .json файлу схемы'
    required: true


runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Run Pytest Validation
      shell: bash
      run: |
        # Заходим в папку экшена для синхронизации зависимостей
        cd ${{ github.action_path }}
        uv sync
        
        # Прокидываем пути. ВАЖНО: PYTHONPATH должен видеть src внутри экшена
        export PYTHONPATH="$PYTHONPATH:${{ github.action_path }}"
        export INPUT_FUNC_PATH="${{ github.workspace }}/${{ inputs.func_path }}"
        export INPUT_SCHEMA_PATH="${{ github.workspace }}/${{ inputs.schema_path }}"
        

        ALLURE_RESULTS_DIR="${{ github.workspace }}/allure-results"

        uv run pytest "${{ github.action_path }}/runner.py" \
          --alluredir="$ALLURE_RESULTS_DIR" \
          --clean-alluredir \
          -v

      continue-on-error: true

    - name: Generate Allure Report
      shell: bash
      run: |
        # 1. Определяем пути АБСОЛЮТНО (в workspace пользователя)
        RESULTS_DIR="${{ github.workspace }}/allure-results"
        REPORT_DIR="${{ github.workspace }}/allure-report"
        
        echo "📂 Результаты тестов: $RESULTS_DIR"
        echo "📦 Папка для отчета: $REPORT_DIR"

        # 2. Проверка (на всякий случай)
        if [ ! -d "$RESULTS_DIR" ] || [ -z "$(ls -A $RESULTS_DIR)" ]; then
          echo "❌ Ошибка: Нет результатов тестов для генерации отчета!"
          exit 1
        fi

        # 3. Установка Node зависимостей (если нет)
        if [ ! -d "${{ github.action_path }}/node_modules" ]; then
          cd ${{ github.action_path }} && npm install
        fi

        # 4. ГЕНЕРАЦИЯ ОТЧЕТА С ЯВНЫМ ВЫХОДОМ В НУЖНУЮ ПАПКУ
        # Флаг --output гарантирует, что папка создастся именно в $REPORT_DIR
        echo "🚀 Генерация HTML отчета..."
        npx allure awesome "$RESULTS_DIR" \
          --config ${{ github.action_path }}/allurerc.yaml \
          --output "$REPORT_DIR"
          
        # 5. Проверка успеха
        if [ -d "$REPORT_DIR" ] && [ "$(ls -A $REPORT_DIR)" ]; then
          echo "✅ Отчет успешно создан в $REPORT_DIR"
          ls -la "$REPORT_DIR"
        else
          echo "❌ Ошибка: Отчет не был создан по пути $REPORT_DIR"
          exit 1
        fi