name: 'AI Function & Schema Validator'
description: 'Валидация функции и генерация Allure отчета'

inputs:
  func_path:
    description: 'Путь к .py файлу'
    required: true
  schema_path:
    description: 'Путь к .json файлу'
    required: true

runs:
  using: 'composite'
  steps:
    # 1. Установка зависимостей (pytest, allure-pytest, pydantic)
    - name: Install Dependencies
      shell: bash
      run: |
        pip install pytest allure-pytest pydantic

    # 2. Запуск твоей валидации
    - name: Run Validation
      shell: bash
      env:
        FUNC_PATH: ${{ github.workspace }}/${{ inputs.func_path }}
        SCHEMA_PATH: ${{ github.workspace }}/${{ inputs.schema_path }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        export PYTHONPATH="$PYTHONPATH:$ACTION_PATH"
        # Запускаем runner.py. Он должен читать переменные окружения FUNC_PATH и SCHEMA_PATH
        # И писать результаты в папку allure-results-functions
        python "$ACTION_PATH/runner.py"
      continue-on-error: true

    # 3. Генерация отчета готовым действием (БЕЗ wget и tar!)
    - name: Generate Allure Report
      if: always()
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: allure-results-functions
        allure_report: allure-report-functions
        gh_pages: false